<header class="hero">

<div class="hero-content">

<h1>NOTIONS RP</h1>

<p>
Les bases essentielles du RolePlay sur Solarys RP
</p>

<div class="neon-divider"></div>

</div>

</header>

<div class="container">

<!-- NOTIONS PRINCIPALES -->
<div class="section">

<div class="section-header" onclick="toggle(this)">
<h2>📖 NOTIONS PRINCIPALES</h2>

<div class="accordion-arrow">
<span>⌃</span>
</div>
</div>

<div class="section-content hidden">

<ul>
<li><strong>Mass RP :</strong> prendre en compte la population invisible autour de vous.</li>
<li><strong>RolePlay :</strong> Le RolePlay, c’est le fait d’incarner un personnage dans un univers fictif.</li>
<li><strong>HRP :</strong> Tout ce qui est en dehors du jeu ou du personnage.</li>
<li><strong>Metagaming :</strong> Utiliser des infos obtenues hors RP en jeu.</li>
<li><strong>Powergaming :</strong> Faire des actions impossibles ou irréalistes.</li>
<li><strong>No Fear RP :</strong> Ne pas avoir peur alors que la situation l’exige.</li>
<li><strong>Force RP :</strong> Forcer une action à un joueur sans lui laisser de choix.</li>
<li><strong>Freekill :</strong> Tuer quelqu’un sans raison RP valable.</li>
<li><strong>Revenge Kill (RK) :</strong> Se venger après une mort RP ou un coma.</li>
<li><strong>New Life Rule (NLR) :</strong> Après ta mort, tu oublies ce qu’il s’est passé.</li>
<li><strong>Win RP :</strong> Chercher à gagner à tout prix.</li>
<li><strong>Pain RP :</strong> Jouer la douleur de son personnage.</li>
<li><strong>Car Kill (CK) :</strong> Écraser quelqu’un volontairement sans raison RP.</li>
<li><strong>Bunny Hop :</strong> Sauter partout pour aller plus vite.</li>
<li><strong>No RP :</strong> Ne pas jouer son rôle.</li>
<li><strong>Scene RP :</strong> Une scène immersive entre joueurs.</li>
<li><strong>Usebug / Exploit :</strong> Utiliser un bug à son avantage.</li>
<li><strong>Streamhack :</strong> Regarder un stream pour trouver quelqu’un.</li>
<li><strong>Cop Bait :</strong> Provoquer la police sans raison.</li>
<li><strong>AFK Abusif :</strong> Être absent en pleine action RP.</li>
<li><strong>Fair Play :</strong> Respecter les autres joueurs.</li>
<li><strong>Cohérence RP :</strong> Ton personnage doit rester logique.</li>
<li><strong>Background RP :</strong> Histoire de ton personnage.</li>
<li><strong>Drive-By :</strong> Tirer depuis un véhicule.</li>
<li><strong>Chicken Run :</strong> Courir dans tous les sens pour éviter les tirs.</li>
<li><strong>Refus RP :</strong> Refuser de jouer une scène.</li>
<li><strong>/me :</strong> Décrire une action de votre personnage.</li>
<li><strong>/pmms :</strong> Gérer le lecteur audio.</li>
</ul>

</div>

</div>

<!-- LEXIQUE RP -->
<div class="section">

<div class="section-header" onclick="toggle(this)">
<h2>💬 LEXIQUE RP</h2>

<div class="accordion-arrow">
<span>⌃</span>
</div>
</div>

<div class="section-content hidden">

<ul>
<li>Maux de tête = bug ou crash</li>
<li>J’ai un bug ➜ J’ai un mal de tête</li>
<li>J’ai crash ➜ Je me suis évanoui</li>
<li>Je freeze ➜ Je suis paralysé</li>
<li>Je vais déco ➜ Je vais dormir</li>
<li>Je reviens ➜ Je reviens de mon repos</li>
<li>Va Discord ➜ Appelle-moi</li>
<li>Ticket ➜ Plainte officielle</li>
<li>Ban / Kick ➜ Parti en voyage à Monaco</li>
<li>AFK ➜ Je suis absent</li>
</ul>

</div>
</div>

<!-- JOUER SANS EXCES -->
<div class="section">

<div class="section-header" onclick="toggle(this)">
<h2>🎮 JOUER SANS EXCÈS</h2>

<div class="accordion-arrow">
<span>⌃</span>
</div>
</div>

<div class="section-content hidden">

<p>Ne prenez pas le RP trop au sérieux : gardez toujours en tête qu’il s’agit d’un jeu et d’une communauté.</p>

<br>

<p>Les insultes légères utilisées pour renforcer l’immersion sont tolérées.</p>

<br>

<p>Les insultes répétées ou agressives sans but RP peuvent être sanctionnées.</p>

<br>

<p>Avant de parler, demandez-vous :</p>

<p><strong>« Si j’étais à sa place, est-ce que je me sentirais insulté ou énervé ? »</strong></p>

</div>
</div>

<!-- JOUER LA DEFAITE -->
<div class="section">

<div class="section-header" onclick="toggle(this)">
<h2>⚖️ JOUER LA DÉFAITE INTELLIGEMMENT</h2>

<div class="accordion-arrow">
<span>⌃</span>
</div>

</div>

<div class="section-content hidden">

<p>
Quand vous perdez une scène (par exemple lors d’un braquage), ne soyez pas susceptible.
</p>

<br>

<p>
Le « Loose RP » (accepter de perdre) peut ouvrir la porte à de nouvelles trames intéressantes.
</p>

<br>

<p>
Rester calme et jouer le jeu offre une meilleure immersion à tout le monde.
</p>

</div>

</div>

<!-- GARDER DU RECUL -->
<div class="section">

<div class="section-header" onclick="toggle(this)">
<h2>🧠 GARDER DU RECUL</h2>

<div class="accordion-arrow">
<span>⌃</span>
</div>
</div>

<div class="section-content hidden">

<p>Ne confondez pas RP et réalité.</p>

<br>

<p>Les propos tenus en jeu ne visent jamais la personne derrière l’écran.</p>

<br>

<p>Évitez le No Fear RP et les réactions impulsives.</p>

<br>

<p>Souvenez-vous : ce n’est qu’un jeu et l’objectif est de s’amuser ensemble.</p>

</div>
</div>

<!-- QUESTIONS FREQUENTES -->
<div class="section">

<div class="section-header" onclick="toggle(this)">
<h2>❓ QUESTIONS FRÉQUENTES</h2>

<div class="accordion-arrow">
<span>⌃</span>
</div>
</div>

<div class="section-content hidden">

<ul>
<li>Je peux contester une sanction ? Oui, via ticket avec preuves.</li>
<li>Signaler un joueur ou un Staff ? Ticket Discord avec pseudo, preuve et contexte.</li>
<li>Créer un groupe ? Procédure en ticket "Illégal".</li>
<li>Accessible aux débutants ? Oui, tutoriel en jeu + staff disponible.</li>
<li>Je peux utiliser une info Discord en jeu ? Non.</li>
<li>Comment rejoindre le serveur ? Discord → FIVEM SOLARYS.</li>
</ul>

</div>
