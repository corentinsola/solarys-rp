<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0d0d0d;
    color:white;
    line-height:1.7;
}

header{
    background:linear-gradient(90deg,#ff4fd8,#6fa8ff);
    padding:30px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:3rem;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

.section{
    background:#151515;
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    padding:35px;
    margin-bottom:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
    transition:.3s;
}

.section:hover{
    transform:translateY(-4px);
}

h2{
    color:#8fc7ff;
    font-size:32px;
    margin-bottom:20px;
}

ul{
    padding-left:25px;
}

li{
    margin-bottom:12px;
    font-size:18px;
}

.home-btn{
    display:inline-block;
    margin-bottom:25px;
    padding:12px 25px;
    background:linear-gradient(90deg,#ff4fd8,#6fa8ff);
    color:white;
    text-decoration:none;
    border-radius:10px;
}

.home-btn:hover{
    opacity:.8;
}

.menu-reglement{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:30px;

    position:sticky;
    top:15px;
    z-index:1000;

    background:rgba(15,15,15,.85);
    padding:15px;
    border-radius:20px;
    backdrop-filter:blur(10px);
}

.menu-reglement a{
    background:linear-gradient(90deg,#ff4fd8,#6fa8ff);
    color:white;
    text-decoration:none;
    padding:16px 28px;
    min-width:160px;
    text-align:center;
    border-radius:14px;
    font-weight:bold;
    font-size:18px;
    box-shadow:0 5px 15px rgba(0,0,0,.3);
    transition:all .3s ease;
}

.menu-reglement a:hover{
    transform:translateY(-4px) scale(1.03);
    box-shadow:0 8px 20px rgba(111,168,255,.4);
    filter:brightness(1.1);
}

.menu-reglement a:active{
    transform:scale(.98);
}
</style>
